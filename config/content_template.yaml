# Content generation prompts and settings

# Theme prompt — Module 2 uses this to create theme from trend
theme_prompt: >
  Given the trend '{keyword}', find associations: related cooking concepts,
  ingredients, cultural angles, or health connections. Based on these
  associations, create a short theme name (up to 3 words) that fits
  naturally into: 'Did you know that [theme]?'

  Return ONLY the theme name, nothing else. Example: "Crispy Cooking"

# Text prompt — Module 3 uses this to generate fact + hashtags
text_prompt: >
  You are a culinary content creator. The theme is '{theme}'.
  This theme will be used as the topic in: "Did you know that {theme}?"

  Generate a supporting fact and hashtags. Requirements:
  - Fact: engaging, educational, fun tone, 3-4 sentences that expand on the theme
  - Hashtags: relevant to the theme
  - img_title: relevant to the theme but not equal to it

  Return as JSON: {{"img_title": "...", "fact": "...", "hashtags": ["...", "..."]}}

# Image prompt — Module 3 uses this to generate image description from fact
image_prompt: >
  You are an image prompt designer. Given this culinary fact:
  "{fact}"

  Create a detailed image description for a Pinterest pin. Style requirements:
  - Warm, appetizing food photography style
  - Bright natural lighting, shallow depth of field
  - Overhead or 45-degree angle
  - Include relevant food ingredients or dish
  - Composition: Shift the main food dish and complex props to the bottom-center and right side of the frame. At the top there will be Typography overlay so this part of the image should be blured but in a way like it will be in real lense photo shot.
  - Typography overlay: Add a text overlay reading EXACTLY: '{img_title}'. Flawless spelling is required.
  - Typography Style: Professional editorial magazine design. Use a modern, ultra-bold, heavy-weight sans-serif font. The text color must be a solid, elegant color drawn from the scene's natural palette (e.g., warm cream, deep terracotta, or rich charcoal) to ensure aesthetic integration. Strictly NO drop shadows, NO black outlines/strokes, and NO glow effects. The text must look like a high-end food magazine cover, relying on the blurred background for readability rather than artificial borders.


  

# Platform-specific content limits
platforms:
  pinterest:
    character_limit: 500
    hashtag_count: 5-10
  instagram:
    character_limit: 2200
    hashtag_count: 10-30

# Number of content variations to generate per theme
variations: 1

# Deduplication settings for themes
deduplication:
  min_hours_between_similar: 12

# AI model selection (text generation only; image model is in platforms.yaml -> visual.model)
text_model: "openai/gpt-4o-mini"

# Text validation settings — runs after text generation to score quality
validation:
  enabled: true
  model: "openai/gpt-4o-mini"
  prompt: >
    You are a content quality analyzer. Analyze the following text and return
    a JSON object with scores from 0.0 to 1.0 (1.0 = best) for each metric:

    - toxicity_score: How non-toxic is this text? (1.0 = completely safe/clean)
    - politeness_score: How polite and respectful is this text?
    - grammar_score: How grammatically correct is this text?
    - sentiment_score: How positive is the sentiment?
    - readability_score: How easy is this text to read?
    - img_title_score: How appropriate and on-brand is the image title? (1.0 = perfect)

    Text to analyze:
    Fact: "{fact}"
    Hashtags: {hashtags}
    Image Title: "{img_title}"

    Return ONLY valid JSON: {{"toxicity_score": 0.95, "politeness_score": 0.90, "grammar_score": 0.85, "sentiment_score": 0.80, "readability_score": 0.88, "img_title_score": 0.90}}
