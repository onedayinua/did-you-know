<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Preview{% endblock %} - Did You Know</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f0f0;
            color: #333;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }
        .preview-container {
            max-width: 600px;
            width: 100%;
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .preview-image {
            width: 100%;
            display: block;
            background: #f5f5f5;
        }
        .preview-body { padding: 24px; }
        .preview-body h1 { font-size: 1.3rem; margin-bottom: 12px; }
        .preview-body .fact-text {
            font-size: 0.95rem;
            line-height: 1.7;
            margin-bottom: 16px;
            color: #444;
        }
        .preview-body .hashtags {
            font-size: 0.85rem;
            color: #1a73e8;
            margin-bottom: 20px;
            line-height: 1.8;
        }
        .metrics {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 20px;
        }
        .metrics h3 { font-size: 0.85rem; color: #666; margin-bottom: 8px; }
        .metric-row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 0.85rem;
        }
        .metric-row .label { color: #888; }
        .metric-row .value { font-weight: 600; }
        .metric-row .value.over { color: #e74c3c; }
        .metric-row .value.under { color: #2ecc71; }
        .back-link {
            display: inline-block;
            margin-top: 16px;
            color: #555;
            text-decoration: none;
            font-size: 0.85rem;
        }
        .back-link:hover { color: #e63946; }
        .btn {
            padding: 6px 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            text-decoration: none;
            display: inline-block;
        }
        .btn-primary { background: #2ecc71; color: #fff; }
        {% block extra_styles %}{% endblock %}
    </style>
</head>
<body>
    <div class="preview-container">
        {% if option.image_path %}
        <img class="preview-image" src="/images/{{ option.image_path }}" alt="{{ option.theme }}">
        {% else %}
        <div class="preview-image" style="height:300px;display:flex;align-items:center;justify-content:center;color:#ccc;font-size:1.2rem;">
            No Image Available
        </div>
        {% endif %}
        <div class="preview-body">
            {% block content %}
            <h1>{{ option.theme }}</h1>
            <div class="fact-text">{{ option.fact }}</div>
            <div class="hashtags">{{ option.hashtags|join(' ') }}</div>
            {% endblock %}
            {% if option.status == 'approved' and option.platform == 'pinterest' %}
            <div class="preview-actions" style="margin-top: 20px; padding-top: 20px; border-top: 1px solid #eee;">
                <div style="display: flex; gap: 12px; margin-bottom: 12px;">
                    <button class="btn btn-primary" onclick="postToPinterest()">Post to Pinterest</button>
                    <form id="mark-posted-form" action="/options/{{ option.id }}/mark-posted" method="post" style="display:inline;">
                        <button type="submit" class="btn" style="background:#3498db;color:#fff;padding:6px 14px;border:none;border-radius:6px;cursor:pointer;font-size:0.85rem;">Mark as Posted</button>
                    </form>
                </div>
                <div id="post-status" style="font-size:0.85rem;color:#666;"></div>
            </div>

            <script>
            console.log("[TKT-029] Preview page loaded, using postMessage bridge pattern");

            async function fetchImageAsBase64(imageUrl) {
                console.log("[TKT-029] fetchImageAsBase64 called with URL:", imageUrl);
                const response = await fetch(imageUrl);
                console.log("[TKT-029] Image fetch response status:", response.status);
                if (!response.ok) throw new Error(`Failed to fetch image (HTTP ${response.status})`);
                const blob = await response.blob();
                console.log("[TKT-029] Image blob size:", blob.size, "bytes, type:", blob.type);
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        console.log("[TKT-029] FileReader complete, base64 length:", reader.result?.length);
                        resolve(reader.result);
                    };
                    reader.onerror = (err) => {
                        console.error("[TKT-029] FileReader error:", err);
                        reject(err);
                    };
                    reader.readAsDataURL(blob);
                });
            }

            async function postToPinterest() {
                console.log("[TKT-029] postToPinterest button clicked");
                const statusEl = document.getElementById("post-status");
                statusEl.innerText = "Loading image...";
                try {
                    const imageUrl = '/images/{{ option.image_path }}';
                    console.log("[TKT-029] Fetching image from:", imageUrl);
                    const imageBase64 = await fetchImageAsBase64(imageUrl);
                    console.log("[TKT-029] Image loaded successfully as base64, length:", imageBase64.length);
                    const title = '{{ option.theme|e }}';
                    const description = '{{ option.fact|e }}\n\n{{ option.hashtags|join(" ") }}';
                    const destinationUrl = '{{ config.get("SITE_URL", "https://example.com") }}';
                    
                    // Use postMessage instead of chrome.runtime.sendMessage
                    // The extension's dashboard-bridge.js content script will pick this up
                    const requestId = Date.now().toString();
                    console.log("[TKT-029] Sending postMessage with requestId:", requestId);
                    
                    window.postMessage(
                        {
                            source: "did-you-know-dashboard",
                            action: "openAndPrefill",
                            requestId: requestId,
                            data: {
                                title: title,
                                description: description,
                                url: destinationUrl,
                                imageBase64: imageBase64
                            }
                        },
                        window.location.origin
                    );
                    
                    statusEl.innerText = "Sent to extension... Check the Pinterest tab.";
                } catch (err) {
                    console.error("[TKT-029] Error in postToPinterest:", err);
                    console.error("[TKT-029] Error name:", err.name);
                    console.error("[TKT-029] Error message:", err.message);
                    console.error("[TKT-029] Error stack:", err.stack);
                    statusEl.innerText = 'Error: ' + err.message;
                }
            }

            // Intercept mark-posted form to show status
            document.getElementById("mark-posted-form").addEventListener("submit", async function(e) {
                e.preventDefault();
                const statusEl = document.getElementById("post-status");
                statusEl.innerText = "Marking as posted...";
                try {
                    const resp = await fetch(this.action, { method: "POST" });
                    const data = await resp.json();
                    if (resp.ok) {
                        statusEl.innerText = "Marked as posted! Reloading...";
                        setTimeout(() => location.reload(), 1000);
                    } else {
                        statusEl.innerText = "Error: " + (data.detail || "Unknown error");
                    }
                } catch (err) {
                    statusEl.innerText = "Error: " + err.message;
                }
            });
            </script>
            {% endif %}
            <a href="/" class="back-link">&larr; Back to Dashboard</a>
        </div>
    </div>
</body>
</html>
