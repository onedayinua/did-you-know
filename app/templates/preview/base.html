<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Preview{% endblock %} - Did You Know</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f0f0;
            color: #333;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }
        .preview-container {
            max-width: 600px;
            width: 100%;
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .preview-image {
            width: 100%;
            display: block;
            background: #f5f5f5;
        }
        .preview-body { padding: 24px; }
        .preview-body h1 { font-size: 1.3rem; margin-bottom: 12px; }
        .preview-body .fact-text {
            font-size: 0.95rem;
            line-height: 1.7;
            margin-bottom: 16px;
            color: #444;
        }
        .preview-body .hashtags {
            font-size: 0.85rem;
            color: #1a73e8;
            margin-bottom: 20px;
            line-height: 1.8;
        }
        .metrics {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 20px;
        }
        .metrics h3 { font-size: 0.85rem; color: #666; margin-bottom: 8px; }
        .metric-row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 0.85rem;
        }
        .metric-row .label { color: #888; }
        .metric-row .value { font-weight: 600; }
        .metric-row .value.over { color: #e74c3c; }
        .metric-row .value.under { color: #2ecc71; }
        .back-link {
            display: inline-block;
            margin-top: 16px;
            color: #555;
            text-decoration: none;
            font-size: 0.85rem;
        }
        .back-link:hover { color: #e63946; }
        {% block extra_styles %}{% endblock %}
    </style>
</head>
<body>
    <div class="preview-container">
        {% if option.image_path %}
        <img class="preview-image" src="/{{ option.image_path }}" alt="{{ option.theme }}">
        {% else %}
        <div class="preview-image" style="height:300px;display:flex;align-items:center;justify-content:center;color:#ccc;font-size:1.2rem;">
            No Image Available
        </div>
        {% endif %}
        <div class="preview-body">
            {% block content %}
            <h1>{{ option.theme }}</h1>
            <div class="fact-text">{{ option.fact }}</div>
            <div class="hashtags">{{ option.hashtags|join(' ') }}</div>
            {% endblock %}
            <a href="/" class="back-link">&larr; Back to Dashboard</a>
        </div>
    </div>
</body>
</html>
