<!DOCTYPE html>
<html>
<head>
  <title>Extension Options</title>
  <style>
    body { padding: 20px; font-family: sans-serif; }
    label { display: block; margin-bottom: 8px; font-weight: bold; }
    input { width: 350px; padding: 5px; margin-bottom: 15px; border: 1px solid #ccc; }
    button { padding: 6px 12px; background-color: #e60023; color: white; border: none; cursor: pointer; border-radius: 4px;}
  </style>
</head>
<body>
  <h1>Pinterest Settings</h1>
  <label for="boardUrl">Default Board URL:</label>
  <input type="text" id="boardUrl" placeholder="https://www.pinterest.com/user/board-name/">
  <br>
  <button id="save">Save Settings</button>
  <script src="options.js"></script>
</body>
</html>
